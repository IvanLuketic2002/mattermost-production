name: Mattermost Production CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Test cluster connection
        run: kubectl get nodes

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/postgres.yml
          kubectl apply -f k8s/mattermost.yml

      - name: Wait for PostgreSQL
        run: kubectl rollout status deployment/postgres -n mattermost --timeout=120s

      - name: Wait for Mattermost
        run: kubectl rollout status deployment/mattermost -n mattermost --timeout=300s

      - name: Get pod status
        run: kubectl get pods -n mattermost

      - name: Print URL
        run: echo "Mattermost URL http://63.183.194.63:30065"
