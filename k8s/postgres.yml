apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: mattermost
data:
  POSTGRES_DB: mattermost
  POSTGRES_USER: mattermost
  POSTGRES_PASSWORD: mattermost123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: mattermost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        envFrom:
        - configMapRef:
            name: postgres-config
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "mattermost"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mattermost
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
